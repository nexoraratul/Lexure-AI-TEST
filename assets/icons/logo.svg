<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- AI Brain icon -->
  <g transform="translate(100, 100)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="25" fill="url(#grad1)"/>
    
    <!-- Nodes -->
    <circle cx="-40" cy="-25" r="12" fill="#3b82f6" opacity="0.8"/>
    <circle cx="40" cy="-25" r="12" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-40" cy="25" r="12" fill="#3b82f6" opacity="0.8"/>
    <circle cx="40" cy="25" r="12" fill="#8b5cf6" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="-30" y1="-15" x2="-15" y2="-8" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-15" x2="15" y2="-8" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="15" x2="-15" y2="8" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="15" x2="15" y2="8" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    
    <!-- Central dot -->
    <circle cx="0" cy="0" r="6" fill="white"/>
  </g>
  
  <!-- Text label -->
  <text x="100" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#3b82f6" font-family="Arial, sans-serif">
    Lexure AI
  </text>
</svg>
